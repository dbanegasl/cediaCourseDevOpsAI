services:

  # ── Servicio Web: nginx sirve los archivos estáticos ──
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - orbital-net

  # ── Servicio API: json-server expone db.json como REST API ──
  # NOTA: No tiene "ports" definidos a propósito.
  # Solo es accesible internamente desde la red "orbital-net".
  # nginx hace proxy de /api/ → http://api:3000/
  api:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./db.json:/app/db.json
    command: >
      sh -c "npm install -g json-server@0.17.4 --quiet &&
             json-server --host 0.0.0.0 --port 3000 /app/db.json"
    networks:
      - orbital-net

networks:
  orbital-net:
    driver: bridge
